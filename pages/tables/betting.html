<script type="application/javascript">
function loadJSON()
{
   var data_file = "https://api.import.io/store/data/dbe59e0b-c8e7-4163-9164-20c8fc910aeb/_query?input/webpage/url=http%3A%2F%2Fcsgolounge.com%2F&_user=71b166e4-3f2d-4e65-bb72-7201cb2c4b25&_apikey=71b166e43f2d4e65bb727201cb2c4b2553b8acda19cd8f18f3c3cb8eff3f721a6878cbcad5d6d0a6f13f2241bac72ddf5ffc8186d987335dcbb4aa29677756e797edfadcc83153d3312fd9017a3fa8c1";

   
   var http_request = new XMLHttpRequest();
   try{
      // Opera 8.0+, Firefox, Chrome, Safari
      http_request = new XMLHttpRequest();
   }catch (e){
      // Internet Explorer Browsers
      try{
         http_request = new ActiveXObject("Msxml2.XMLHTTP");
      }catch (e) {
         try{
            http_request = new ActiveXObject("Microsoft.XMLHTTP");
         }catch (e){
            // Something went wrong
            alert("Your browser broke!");
            return false;
         }
      }
   }
   http_request.onreadystatechange  = function(){
      if (http_request.readyState == 4  )
      {
        // Javascript function JSON.parse to parse JSON data
        var jsonObj = JSON.parse(http_request.responseText);

        // jsonObj variable now contains the data structure and can
        // be accessed as jsonObj.name and jsonObj.country.
	// GAME 0
        document.getElementById("0team1").innerHTML =  jsonObj.results[0].team1;
        document.getElementById("0team2").innerHTML = jsonObj.results[0].team2;
        document.getElementById("0team1odd").innerHTML = jsonObj.results[0].team1odd;
		document.getElementById("0team2odd").innerHTML = jsonObj.results[0].team2odd;
        document.getElementById("0bo").innerHTML = jsonObj.results[0].bo;
		document.getElementById("0tourny").innerHTML = jsonObj.results[0].tourny;
		document.getElementById("0eta").innerHTML = jsonObj.results[0].eta;
	
      }
   }
   http_request.open("GET", data_file, true);
   http_request.send();
}
setInterval(loadJSON, 30000 );

</script>
